site_name: pyspark-antipattern
site_description: A fast, opinionated PySpark linter written in Rust
site_author: Skander Boudawara
site_url: https://skanderboudawara.github.io/pyspark-antipattern
repo_url: https://github.com/skanderboudawara/pyspark-antipattern
repo_name: skanderboudawara/pyspark-antipattern

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  logo: icon.jpg
  favicon: icon.jpg
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Settings:
    - settings/index.md
    - failing_rules: settings/failing_rules.md
    - warning_rules: settings/warning_rules.md
    - ignore_rules: settings/ignore_rules.md
    - show_information: settings/show_information.md
    - show_best_practice: settings/show_best_practice.md
    - distinct_threshold: settings/distinct_threshold.md
    - explode_threshold: settings/explode_threshold.md
    - loop_threshold: settings/loop_threshold.md
    - exclude_dirs: settings/exclude_dirs.md
  - Rules:
