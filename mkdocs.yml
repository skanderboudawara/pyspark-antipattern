site_name: pyspark-antipattern
site_description: "A static analysis linter for PySpark +60 rules that catch performance antipatterns (collect, UDFs, shuffle explosions, loops) before they reach your cluster. Written in Rust, runs in CI/CD."
site_author: Skander Boudawara
site_url: https://skanderboudawara.github.io/pyspark-antipattern
repo_url: https://github.com/skanderboudawara/pyspark-antipattern
repo_name: skanderboudawara/pyspark-antipattern

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  logo: icon.jpg
  favicon: icon.jpg
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

