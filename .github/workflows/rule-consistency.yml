name: Rule consistency

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  check-rule-consistency:
    name: All rules registered in all locations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run consistency check
        run: python scripts/check_rule_consistency.py
