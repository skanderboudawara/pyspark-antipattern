name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. Run tests on all platforms ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

  # ── 2. Build wheels for each platform ──────────────────────────────────────
  build:
    name: Build wheel (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          # Linux x86_64 — manylinux for broad pip compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            manylinux: "off"

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }} --out dist
          manylinux: ${{ matrix.manylinux }}
          maturin-version: latest

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # ── 3. Create GitHub release and attach all wheels ─────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git describe can find the previous tag

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const fs   = require('fs');
            const path = require('path');

            const tag = context.ref.replace('refs/tags/', '');

            // Build release notes from commits since the previous tag
            let prevTag = '';
            try {
              prevTag = execSync('git describe --tags --abbrev=0 HEAD^').toString().trim();
            } catch (_) {}
            const range = prevTag ? `${prevTag}..HEAD` : 'HEAD';
            const body  = execSync(
              `git log ${range} --pretty=format:"- %s" --no-merges`
            ).toString().trim();

            // Create the release
            const { data: release } = await github.rest.repos.createRelease({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              tag_name: tag,
              name:     tag,
              body,
            });

            // Upload every wheel as a release asset
            const wheels = fs.readdirSync('dist').filter(f => f.endsWith('.whl'));
            if (wheels.length === 0) core.setFailed('No wheels found in dist/');
            for (const file of wheels) {
              const data = fs.readFileSync(path.join('dist', file));
              await github.rest.repos.uploadReleaseAsset({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: release.id,
                name:       file,
                data,
                headers: { 'content-type': 'application/zip' },
              });
            }

  # ── 4. Publish all wheels to PyPI ──────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing (optional, harmless if not configured)
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload --skip-existing dist/*.whl
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
