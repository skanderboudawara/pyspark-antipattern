name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. Run tests on all platforms ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

  # ── 2. Build wheels for each platform ──────────────────────────────────────
  build:
    name: Build wheel (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          # Linux x86_64 — manylinux for broad pip compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            manylinux: "off"

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }} --out dist
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # ── 3. Create GitHub release and attach all wheels ─────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── 4. Publish all wheels to PyPI ──────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing (optional, harmless if not configured)
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
