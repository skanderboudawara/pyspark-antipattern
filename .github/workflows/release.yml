name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  workflow_call:

jobs:
  # ── 0. Verify tag matches versions in pyproject.toml and Cargo.toml ────────
  check-version:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag matches pyproject.toml and Cargo.toml
        run: |
          # When triggered by a tag push GITHUB_REF_NAME is the tag (e.g. v1.2.3).
          # When called via workflow_call it is the branch name, so fall back to
          # the tag that points at HEAD (set by bump-version before invoking us).
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" != v* ]]; then
            REF=$(git tag --points-at HEAD | grep '^v' | sort -V | tail -1)
          fi
          TAG="${REF#v}"
          PYPROJECT=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CARGO=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          echo "Tag version   : $TAG"
          echo "pyproject.toml: $PYPROJECT"
          echo "Cargo.toml    : $CARGO"

          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "ERROR: tag v$TAG does not match pyproject.toml version $PYPROJECT"
            exit 1
          fi
          if [ "$TAG" != "$CARGO" ]; then
            echo "ERROR: tag v$TAG does not match Cargo.toml version $CARGO"
            exit 1
          fi
          echo "All versions match: $TAG"

  # ── 1. Clippy — enforce zero warnings ──────────────────────────────────────
  clippy:
    name: Clippy
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy
        run: cargo clippy -- -D warnings

  # ── 2. Formatting — enforce rustfmt (max_width = 100) ──────────────────────
  fmt:
    name: Rustfmt
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # ── 3. Run tests on all platforms ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: [check-version, clippy, fmt]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

  # ── 3. Build wheels for each platform ──────────────────────────────────────
  build:
    name: Build wheel (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          # Linux x86_64 — manylinux for broad pip compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux ARM64 — needs manylinux_2_28 for a GCC new enough to support
          # -Wdate-time (required by libmimalloc-sys); glibc 2.28+ is present
          # on Ubuntu 20.04+, RHEL 8+, and all modern aarch64 distros.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            manylinux: "off"

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }} --out dist
          manylinux: ${{ matrix.manylinux }}
          maturin-version: latest

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # ── 4. Create GitHub release and attach all wheels ─────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git describe can find the previous tag

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/


      - name: Build release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          BREAKING=""
          FEAT=""
          ENHANCE=""
          FIX=""
          CHORE=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            HASH="${line%% *}"
            MSG="${line#* }"

            case "$MSG" in
              breaking:\ *)       BREAKING+="- ${MSG#breaking: } (${HASH})"$'\n' ;;
              feat:\ *)           FEAT+="- ${MSG#feat: } (${HASH})"$'\n' ;;
              enhance:\ *)        ENHANCE+="- ${MSG#enhance: } (${HASH})"$'\n' ;;
              fix:\ *)            FIX+="- ${MSG#fix: } (${HASH})"$'\n' ;;
              chore\(deps\):\ *)  CHORE+="- ${MSG#chore(deps): } (${HASH})"$'\n' ;;
              chore:\ *)          CHORE+="- ${MSG#chore: } (${HASH})"$'\n' ;;
            esac
          done < <(git log $RANGE --pretty=format:"%h %s" --no-merges)

          NOTESFILE=$(mktemp)
          {
            [ -n "$BREAKING" ] && printf '## 💥 Breaking Changes\n%s\n' "$BREAKING"
            [ -n "$FEAT" ]     && printf '## ⬆️ Features\n%s\n' "$FEAT"
            [ -n "$ENHANCE" ]  && printf '## ✨ Enhancements\n%s\n' "$ENHANCE"
            [ -n "$FIX" ]      && printf '## 🐛 Bug Fixes\n%s\n' "$FIX"
            [ -n "$CHORE" ]    && printf '## 🧹 Chores\n%s\n' "$CHORE"
          } > "$NOTESFILE"
          echo "notes_file=$NOTESFILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          body_path: ${{ steps.notes.outputs.notes_file }}
          fail_on_unmatched_files: true

  # ── 5. Publish all wheels to PyPI ──────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing (optional, harmless if not configured)
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Publish to PyPI
        run: uv publish --check-url https://pypi.org/simple/pyspark-antipattern/ dist/*.whl
        env:
          UV_PUBLISH_USERNAME: ${{ secrets.PYPI_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}
