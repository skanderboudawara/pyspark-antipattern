name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── 0. Verify tag matches versions in pyproject.toml and Cargo.toml ────────
  check-version:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches pyproject.toml and Cargo.toml
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CARGO=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          echo "Tag version   : $TAG"
          echo "pyproject.toml: $PYPROJECT"
          echo "Cargo.toml    : $CARGO"

          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "ERROR: tag v$TAG does not match pyproject.toml version $PYPROJECT"
            exit 1
          fi
          if [ "$TAG" != "$CARGO" ]; then
            echo "ERROR: tag v$TAG does not match Cargo.toml version $CARGO"
            exit 1
          fi
          echo "All versions match: $TAG"

  # ── 1. Run tests on all platforms ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

  # ── 2. Build wheels for each platform ──────────────────────────────────────
  build:
    name: Build wheel (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          # Linux x86_64 — manylinux for broad pip compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux ARM64 — needs manylinux_2_28 for a GCC new enough to support
          # -Wdate-time (required by libmimalloc-sys); glibc 2.28+ is present
          # on Ubuntu 20.04+, RHEL 8+, and all modern aarch64 distros.
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            manylinux: "off"

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --target ${{ matrix.target }} --out dist
          manylinux: ${{ matrix.manylinux }}
          maturin-version: latest

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  # ── 3. Create GitHub release and attach all wheels ─────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git describe can find the previous tag

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: List wheels
        run: ls -lh dist/


      - name: Build release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          BULLETS=$(git log $RANGE --pretty=format:"- %s" --no-merges)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BULLETS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: true

  # ── 4. Publish all wheels to PyPI ──────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing (optional, harmless if not configured)
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Publish to PyPI
        run: uv publish --check-url https://pypi.org/simple/pyspark-antipattern/ dist/*.whl
        env:
          UV_PUBLISH_USERNAME: ${{ secrets.PYPI_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}
